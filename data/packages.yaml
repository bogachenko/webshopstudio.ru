tiers:
  - id: tier-business
    title: Сайт-визитка
    description: Для специалистов, небольших компаний и услуг.
    mostPopular: false
    features:
      - до 5 страниц
      - адаптивный дизайн
      - форма заявки
      - подключение домена и хостинга
      - базовая настройка
  - id: tier-landing
    title: Лендинг
    description: Для рекламы, услуги, продукта или акции.
    mostPopular: true
    features:
      - структура продающей страницы
      - блоки для предложения, преимуществ, услуг, отзывов и формы заявки
      - адаптивная вёрстка
      - подключение аналитики
      - настройка формы заявки
  - id: tier-ecommerce
    title: Интернет-магазин
    description: Для продажи товаров онлайн.
    mostPopular: false
    features:
      - WordPress + WooCommerce
      - каталог товаров
      - корзина и оформление заказа
      - настройка оплаты и доставки
      - базовое обучение управлению магазином