heading: Форматы работы
description: "Выберите подходящий формат: от быстрого аудита и исправления ошибок до полной подготовки AI-прототипа к запуску."
priceNote: "Стоимость зависит от состояния проекта. После первичного аудита вы получите список проблем, план работ и оценку по срокам и бюджету."
ctaLabel: Получить оценку
tiers:
  - id: tier-business
    title: Аудит и быстрый фикс
    description: Для AI-прототипов, где нужно быстро понять проблемы, получить план и исправить самые критичные ошибки.
    term: от 1 дня
    mostPopular: false
    features:
      - аудит проекта, зависимостей и структуры кода
      - список критических проблем
      - исправление приоритетных багов
      - проверка форм и основных сценариев
      - рекомендации по доработке
  - id: tier-landing
    title: Доведение до запуска
    description: Для сайтов и MVP, которые нужно привести в рабочее состояние перед показом пользователям.
    term: от 3-7 дней
    mostPopular: true
    features:
      - исправление ошибок AI-сгенерированного кода
      - рефакторинг структуры проекта
      - доработка страниц, форм и функционала
      - подбор хостинга
      - деплой проекта
      - настройка домена и SSL
      - подключение аналитики
      - техническое внедрение политики ПДн, согласий и cookie-баннера
  - id: tier-ecommerce
    title: Стабилизация и развитие
    description: Для проектов, которые нужно глубже стабилизировать, развернуть и подготовить к дальнейшей разработке после запуска.
    term: 1-3 недели
    mostPopular: false
    features:
      - глубокий аудит архитектуры
      - рефакторинг и оптимизация кода
      - настройка окружений
      - настройка CI/CD
      - деплой на хостинг, VPS или облако
      - подключение базы данных и внешних сервисов
      - базовая техническая проверка безопасности
      - техническая документация по проекту
      - поддержка после запуска