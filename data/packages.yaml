heading: Пакеты услуг
description: Выберите формат работы от быстрого аудита и исправления ошибок до полного запуска AI-прототипа.
ctaLabel: Обсудить проект
tiers:
  - id: tier-business
    title: Аудит и быстрый фикс
    description: Для AI-прототипов, где нужно быстро понять проблемы и исправить критические ошибки.
    mostPopular: false
    features:
      - аудит проекта и кода
      - список критических проблем
      - исправление приоритетных багов
      - проверка форм и основных сценариев
      - рекомендации по доработке
  - id: tier-landing
    title: Доведение до запуска
    description: Для сайтов и MVP, которые нужно привести в рабочее состояние перед показом пользователям.
    mostPopular: true
    features:
      - исправление ошибок AI-сгенерированного кода
      - рефакторинг структуры проекта
      - доработка страниц, форм и функционала
      - подбор хостинга
      - деплой проекта
      - настройка домена и SSL
      - подключение аналитики
      - политика ПДн, согласия и cookie-баннер
  - id: tier-ecommerce
    title: Production-ready пакет
    description: Для проектов, которые нужно стабилизировать, развернуть и подготовить к дальнейшему развитию.
    mostPopular: false
    features:
      - глубокий аудит архитектуры
      - рефакторинг и оптимизация кода
      - настройка окружений
      - настройка CI/CD
      - деплой на хостинг, VPS или облако
      - подключение базы данных и внешних сервисов
      - базовая проверка безопасности
      - техническая документация по проекту
      - поддержка после запуска