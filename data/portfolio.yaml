heading: Примеры работ
description: Демонстрационные кейсы показывают, как AI-прототип можно довести до аккуратного, стабильного и готового к запуску продукта.
projects:
  - name: Доработка AI-прототипа лендинга
    tag: AI-прототип
    image: /images/portfolio/demo-1.webp
    imageAlt: Скриншот доработанного AI-прототипа лендинга
    taskTitle: Задача клиента
    taskDescription: Клиент собрал первый вариант лендинга через AI-инструмент, но страница была сырой часть блоков отображалась некорректно, форма заявки работала нестабильно, адаптивность на мобильных устройствах требовала доработки, а проект не был готов к запуску рекламы и приёму заявок.
    resultTitle: Что было сделано
    resultDescription: Провели аудит проекта, исправили ошибки в вёрстке и логике формы, доработали адаптивность, привели структуру страницы в порядок, подключили Яндекс Метрику и базовые цели для заявок. Подобрали хостинг, настроили домен, SSL и деплой. Дополнительно внедрили политику обработки персональных данных, согласие в форме и cookie-баннер.

  - name: Подготовка MVP-сервиса к запуску
    tag: MVP после vibe coding
    image: /images/portfolio/demo-2.webp
    imageAlt: Скриншот MVP-сервиса после доработки
    taskTitle: Задача клиента
    taskDescription: У клиента был MVP, собранный с помощью AI-кодинга. Прототип демонстрировал идею продукта, но в нём были ошибки, повторяющийся код, нестабильные сценарии, проблемы с деплоем и непонятная структура проекта. Нужно было довести сервис до состояния, в котором его можно показать первым пользователям.
    resultTitle: Что было сделано
    resultDescription: Разобрали кодовую базу, исправили критические ошибки, упростили структуру проекта, доработали ключевые пользовательские сценарии и проверили работу форм. Настроили окружение, переменные, хостинг, SSL и деплой. Для дальнейшей разработки подготовили базовые рекомендации по проекту и передали клиенту доступы к репозиторию, хостингу и сервисам.