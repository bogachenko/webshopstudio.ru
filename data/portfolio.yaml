projects:
  - name: Интернет-магазин для продажи товаров
    tag: Интернет-магазин
    image: /images/portfolio/shop-demo.webp
    imageAlt: Скриншот интернет-магазина
    taskTitle: Задача клиента
    taskDescription: Создать современный интернет-магазин одежды с визуально привлекательной главной страницей, удобной навигацией и понятной структурой каталога. Клиенту было важно красиво представить новую коллекцию, выделить популярные категории товаров и запустить полноценные онлайн-продажи через сайт.
    resultTitle: Что было сделано
    resultDescription: Создана структура сайта, продуман пользовательский путь от главной страницы до оформления заказа, разработан минималистичный дизайн в премиальном стиле. Настроены категории товаров, карточки продукции, корзина, страница оформления заказа и базовая интеграция WooCommerce для управления товарами и продажами.

  - name: Сервис для поставщиков маркетплейсов
    tag: Корпоративный сайт
    image: /images/portfolio/corporate-demo.webp
    imageAlt: Скриншот корпоративного сайта
    taskTitle: Задача клиента
    taskDescription: Создать сервис для продавцов маркетплейсов, который помогает фиксировать процесс упаковки заказов на видео, хранить видеозаписи отгрузок, работать с организациями, командами, подписками и интеграциями с Ozon/Wildberries. Отдельно требовалось упростить работу пользователей через ИИ-агента внутри веб-панели.
    resultTitle: Что было сделано
    resultDescription: Мобильное приложение и веб-панель, авторизация, управление организациями и командой, запись и загрузка видео упаковки, архив, аудит, подписки, интеграции с Ozon и Wildberries, редактор шаблонов этикеток, демо-режим и локальное хранение видео. Также был разработан встроенный ИИ-агент.