heading: Типовые задачи после vibe coding
description: Примеры ситуаций, когда AI-прототип уже показывает идею продукта, но его нужно стабилизировать, доработать и подготовить к запуску.
projects:
  - name: AI-лендинг после Lovable или Bolt
    tag: AI-прототип
    image: /images/portfolio/demo-1.webp
    imageAlt: Скриншот доработанного AI-прототипа лендинга
    taskTitle: Типовая ситуация
    taskDescription: Первый вариант лендинга собран через AI-инструмент, но страница выглядит сырой, часть блоков отображается некорректно, форма заявки работает нестабильно, адаптивность требует доработки, а проект ещё не готов к запуску рекламы и приёму заявок.
    resultTitle: Что обычно делаем
    resultDescription: Проводим аудит проекта, исправляем ошибки в вёрстке и логике формы, дорабатываем адаптивность, приводим структуру страницы в порядок, подключаем Яндекс Метрику и базовые цели для заявок. Подбираем хостинг, настраиваем домен, SSL и деплой. Дополнительно технически внедряем политику обработки персональных данных, согласие в форме и cookie-баннер.

  - name: MVP-сервис после Cursor или Replit
    tag: MVP после vibe coding
    image: /images/portfolio/demo-2.webp
    imageAlt: Скриншот MVP-сервиса после доработки
    taskTitle: Типовая ситуация
    taskDescription: MVP собран с помощью AI-кодинга и демонстрирует идею продукта, но в нём есть ошибки, повторяющийся код, нестабильные сценарии, проблемы с деплоем и непонятная структура проекта. Нужно довести сервис до состояния, в котором его можно показать первым пользователям.
    resultTitle: Что обычно делаем
    resultDescription: Разбираем кодовую базу, исправляем критические ошибки, упрощаем структуру проекта, дорабатываем ключевые пользовательские сценарии и проверяем работу форм. Настраиваем окружение, переменные, хостинг, SSL и деплой. Для дальнейшей разработки готовим базовые рекомендации по проекту и передаём доступы к репозиторию, хостингу и сервисам.