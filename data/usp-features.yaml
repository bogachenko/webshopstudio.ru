highlightLabel: Ключевое предложение
items:
  - title: "AI-прототип → рабочий продукт"
    description: "Исправим ошибки, отрефакторим код и доведём сайт или MVP до состояния, пригодного для запуска."
    icon: "zap"

  - title: "152-ФЗ с запуска"
    description: "Внедрим политику ПДн, согласия в формах, cookie-баннер и ссылки на документы."
    icon: "shield-check"

  - title: "Хостинг, деплой и CI/CD"
    description: "Подберём хостинг, задеплоим проект, настроим SSL и автоматический деплой при необходимости."
    icon: "globe"

  - title: "Проект остаётся вашим"
    description: "Передаём доступы к репозиторию, хостингу, домену, сервисам и объясняем, что было сделано."
    icon: "key"