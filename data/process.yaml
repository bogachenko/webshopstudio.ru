heading: Как проходит работа
steps:
  - title: Заявка
    description: Вы отправляете ссылку на AI-прототип, репозиторий или текущую версию проекта.
  - title: Аудит
    description: Проверяем код, структуру, ошибки, формы, зависимости, интеграции и готовность к запуску.
  - title: План доработки
    description: Показываем, что нужно исправить сейчас, что можно отложить и сколько займёт работа.
  - title: Исправление и рефакторинг
    description: Исправляем баги, дорабатываем функционал, упрощаем структуру и приводим проект в порядок.
  - title: Запуск
    description: Подбираем хостинг, деплоим проект, настраиваем SSL, CI/CD, формы, аналитику, документы и передаём доступы.