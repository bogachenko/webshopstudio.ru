steps:
  - title: Заявка
    description: Вы оставляете заявку или пишете нам.
  - title: Консультация
    description: Обсуждаем задачу, нишу, сайт, функции и сроки.
  - title: Оценка проекта
    description: Предлагаем решение, стоимость и этапы работы.
  - title: Разработка
    description: Создаём сайт и согласовываем с вами ключевые этапы.
  - title: Запуск
    description: Подключаем домен, настраиваем хостинг, проверяем сайт и передаём доступы.