heading: Этапы работы
steps:
  - title: Заявка
    description: Вы отправляете ссылку на прототип, репозиторий или текущую версию проекта.
  - title: Аудит
    description: Проверяем код, ошибки, структуру, формы, зависимости, деплой и готовность к запуску.
  - title: План доработки
    description: Показываем, что нужно исправить сейчас, что можно отложить и какой формат работы подойдёт.
  - title: Исправление и рефакторинг
    description: Исправляем баги, дорабатываем сценарии, упрощаем структуру и приводим проект в порядок.
  - title: Запуск
    description: Деплоим проект, настраиваем домен, SSL, формы, аналитику, CI/CD при необходимости и передаём доступы.