heading: Частые вопросы
items:
  - question: "Вы работаете с проектами, созданными через Claude Code, Lovable, Replit, Bolt или Cursor?"
    answer: "Да. Мы разбираем AI-сгенерированные проекты и MVP, исправляем ошибки, дорабатываем функционал, приводим код в порядок и готовим проект к запуску."

  - question: "Можно прийти только с сырым AI-прототипом?"
    answer: "Да. Достаточно ссылки на проект, репозитория или доступа к текущей версии. Мы проведём аудит, покажем основные проблемы и предложим план доработки."

  - question: "Вы просто исправляете баги или можете полностью подготовить проект к запуску?"
    answer: "Можем сделать оба варианта. Исправим отдельные ошибки или полностью подготовим проект: рефакторинг, доработка, хостинг, деплой, домен, SSL, формы, аналитика и базовые документы."

  - question: "Вы поможете выбрать хостинг и задеплоить сайт?"
    answer: "Да. Подберём хостинг, VPS или облачное решение под проект, настроим окружение, домен, SSL и разместим сайт или приложение."

  - question: "Вы настраиваете CI/CD?"
    answer: "Да. Если проект развивается и обновляется через репозиторий, настроим автоматический деплой через CI/CD, чтобы изменения можно было выкатывать быстрее и безопаснее."

  - question: "Вы помогаете с 152-ФЗ?"
    answer: "Да. Мы технически внедряем базовые элементы: политику обработки персональных данных, согласия в формах и cookie-баннер. Юридические формулировки при необходимости можно дополнительно согласовать с юристом."

  - question: "Можно доработать только форму, оплату, личный кабинет или интеграцию?"
    answer: "Да. Можно заказать точечную доработку отдельного функционала: формы, оплату, CRM, API, базу данных, авторизацию, личный кабинет или другой сценарий."

  - question: "После вашей работы проект можно будет развивать дальше?"
    answer: "Да. Одна из задач рефакторинга — сделать проект понятнее и удобнее для дальнейшей разработки."