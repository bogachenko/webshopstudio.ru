items:
  - question: "Сайт будет зарегистрирован на меня?"
    answer: "Да. Домен и хостинг регистрируются на данные клиента. Вы получаете доступы и контроль над сайтом."

  - question: "Я смогу самостоятельно редактировать сайт?"
    answer: "Да. После передачи сайта вы сможете менять тексты, изображения, товары и другую информацию через административную панель."

  - question: "Вы создаёте только сайты на WordPress?"
    answer: "Интернет-магазины мы обычно создаём на WordPress + WooCommerce. Простые сайты можем сделать в другом формате, если он лучше подходит под задачу."

  - question: "Можно заказать только сайт без домена и хостинга?"
    answer: "Да. Если у вас уже есть домен и хостинг, мы можем работать с ними."

  - question: "Вы добавляете товары на сайт?"
    answer: "Да, наполнение сайта можно включить в проект отдельно."

  - question: "Сайт можно будет доработать позже?"
    answer: "Да, сайт можно развивать дальше: добавлять страницы, функции, интеграции и новые разделы."