items:
  - title: "Интернет-магазины на WordPress + WooCommerce"
    description: "Создаём интернет-магазины с удобным управлением товарами, заказами и клиентами."
    icon: shopping-cart
    features:
      - "установка WordPress и WooCommerce"
      - "настройка каталога товаров"
      - "категории, фильтры, карточки товаров"
      - "корзина и оформление заказа"
      - "настройка способов оплаты и доставки"
      - "базовая SEO-настройка"
      - "адаптация под мобильные устройства"
      - "инструкция по управлению магазином"

  - title: "Простые сайты под ключ"
    description: "Разрабатываем сайты любого формата: лендинги, сайты-визитки, корпоративные сайты, промо-страницы и портфолио."
    icon: layout
    features:
      - "структура сайта"
      - "дизайн или адаптация готового шаблона"
      - "вёрстка страниц"
      - "формы заявок"
      - "подключение домена"
      - "настройка хостинга"
      - "базовая техническая настройка"
      - "передача сайта клиенту"