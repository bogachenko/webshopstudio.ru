items:
  - title: "Доработка AI-прототипов и MVP"
    description: "Приводим в порядок сайты и приложения, созданные через Lovable, Replit, Bolt, Cursor, Claude Code и другие AI-инструменты."
    icon: shopping-cart
    features:
      - "аудит AI-сгенерированного кода"
      - "исправление ошибок и сломанных сценариев"
      - "доработка страниц, форм и компонентов"
      - "рефакторинг структуры проекта"
      - "подключение базы данных, CMS или API"
      - "адаптация под мобильные устройства"
      - "подготовка проекта к дальнейшей разработке"
      - "список рекомендаций после аудита"

  - title: "Запуск, хостинг, деплой и CI/CD"
    description: "Готовим проект к работе с реальными пользователями: размещаем, настраиваем окружение и проверяем ключевые сценарии."
    icon: layout
    features:
    - "подбор хостинга, VPS или облака"
    - "настройка домена и SSL"
    - "деплой сайта или приложения"
    - "настройка переменных окружения"
    - "настройка CI/CD при необходимости"
    - "подключение аналитики"
    - "проверка форм заявок и уведомлений"
    - "передача доступов клиенту"

  - title: "Базовая подготовка сайта к 152-ФЗ"
    description: "Технически внедряем документы и элементы, которые нужны сайту при сборе заявок, cookie и персональных данных."
    icon: shield-check
    features:
      - "политика обработки персональных данных"
      - "согласия на обработку ПДн в формах"
      - "чекбоксы согласия рядом с формами"
      - "cookie-баннер"
      - "ссылки на документы в формах и футере"
      - "проверка форм, аналитики и сторонних сервисов"
      - "страницы юридических документов"