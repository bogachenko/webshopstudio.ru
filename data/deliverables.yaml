heading: В результате вы получаете AI-прототип, готовый к запуску
items:
  - исправленные критические ошибки
  - понятную структуру проекта
  - отрефакторенный и более поддерживаемый код
  - доработанные страницы и пользовательские сценарии
  - сайт или приложение, размещённое на хостинге
  - настроенный домен и SSL-сертификат
  - настроенный деплой или CI/CD при необходимости
  - рабочие формы заявок
  - подключенную Яндекс Метрику и базовые цели для форм заявок
  - политику ПДн, согласия и cookie-баннер
  - доступы к проекту, домену, хостингу и репозиторию
  - краткий список выполненных работ и рекомендаций