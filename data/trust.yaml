heading: Работаем с проектом аккуратно
description: Подключаемся к вашему репозиторию, работаем прозрачно и передаём результат так, чтобы проект можно было развивать дальше.
items:
  - работаем через ваш GitHub, GitLab или архив проекта
  - не забираем проект себе и не привязываем его к нашим аккаунтам
  - можем вносить изменения в отдельной ветке
  - фиксируем список выполненных работ
  - передаём доступы к хостингу, домену, аналитике и сервисам
  - не ломаем рабочую версию без согласования
  - объясняем, что было исправлено и что лучше доработать следующим этапом