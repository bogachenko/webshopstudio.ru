heading: Хотите довести AI-прототип до запуска?
description: Пришлите ссылку на проект, репозиторий или коротко опишите задачу. Мы посмотрим, что нужно исправить, и предложим понятный план работ.

fields:
  name:
    label: Имя
    placeholder: Иван Иванов
  contactInfo:
    label: Email
    placeholder: name@example.com
  taskType:
    label: Тип задачи
    options:
      - Аудит AI-прототипа
      - Исправление ошибок
      - Доработка MVP до запуска
      - Хостинг, деплой и CI/CD
      - Подготовка сайта к 152-ФЗ
      - Интеграции, формы, API или база данных
      - Пока не уверен
  message:
    label: Краткое описание задачи
    placeholder: Расскажите, где собран проект, что сейчас не работает и что нужно получить на выходе.

consent:
  before: Я даю согласие на обработку персональных данных и подтверждаю, что ознакомлен с
  personalDataLabel: согласием на обработку персональных данных
  and: и
  privacyLabel: политикой обработки персональных данных

submitLabel: Обсудить проект
submittingLabel: Отправляем...