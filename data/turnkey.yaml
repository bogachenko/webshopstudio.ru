steps:
  - title: Обсуждаем задачу
    description: Понимаем, какой сайт нужен, какие страницы, функции и цели он должен иметь.
    icon: message-square
  - title: Подбираем домен и хостинг
    description: Помогаем зарегистрировать доменное имя и хостинг на данные клиента.
    icon: globe
  - title: Создаём сайт
    description: Разрабатываем структуру, дизайн, страницы и функционал.
    icon: laptop
  - title: Настраиваем и проверяем всё
    description: Проверяем формы, адаптивность, скорость и базовые настройки.
    icon: wrench
  - title: Передаём сайт клиенту
    description: Передаём доступы и объясняем, как пользоваться сайтом и управлять контентом.
    icon: key