heading: Что берём на себя
description: "Закрываем техническую часть запуска: ошибки, код, формы, деплой, хостинг, домен, SSL, аналитику и передачу доступов."
steps:
  - title: Код и ошибки
    description: Разбираем проект, исправляем критические баги, сломанные сценарии и проблемные места в структуре.
    icon: message-square

  - title: Доработка и запуск
    description: Дорабатываем интерфейс, формы, интеграции, окружение, хостинг, домен, SSL и деплой.
    icon: laptop

  - title: Передача проекта
    description: Передаём доступы, список выполненных работ и рекомендации, чтобы проект можно было развивать дальше.
    icon: key