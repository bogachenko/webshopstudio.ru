heading: Кому подойдёт доработка AI-прототипа
items:
  - title: Основатели с AI-прототипом
    description: "Собрали MVP через Lovable, Replit, Bolt, Cursor или Claude Code, но проект ломается, выглядит сырым или не готов к запуску."
    icon: shopping-bag
    color: text-blue-600
    bgColor: bg-blue-50

  - title: Стартапы и малые команды
    description: "Нужно быстро привести прототип в порядок, исправить ошибки, доработать функционал и подготовить проект к первым пользователям."
    icon: briefcase
    color: text-indigo-600
    bgColor: bg-indigo-50

  - title: Не-технические предприниматели
    description: "Есть сайт или приложение, созданное с помощью AI, но непонятно, как его запустить, где разместить и что исправлять в первую очередь."
    icon: user
    color: text-emerald-600
    bgColor: bg-emerald-50

  - title: Команды перед запуском
    description: "Нужны деплой, хостинг, CI/CD, формы, аналитика, документы и базовая техническая готовность сайта к реальному трафику."
    icon: building
    color: text-rose-600
    bgColor: bg-rose-50