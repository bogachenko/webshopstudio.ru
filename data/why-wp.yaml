heading: Когда AI-прототип нельзя запускать как есть
features:
  - есть ошибки в ключевых сценариях, формах или интеграциях
  - проект не деплоится или зависит от временной среды AI-инструмента
  - код сложно поддерживать и страшно отдавать другим разработчикам
  - нет понятного хостинга, домена, SSL, аналитики и доступа к проекту