<header class="fixed inset-x-0 top-0 z-50">
  <div class="site-container">
<nav class="mt-3 rounded-2xl border border-white/65 bg-white/70 px-4 py-3 shadow-[0_20px_65px_-30px_rgba(30,41,59,0.55)] backdrop-blur-xl supports-[backdrop-filter]:bg-white/45 lg:px-6" aria-label="Global">
      <div class="flex items-center justify-between">
        <div class="flex lg:flex-1">
          <a href="/" class="-m-1.5 flex items-center gap-2 p-1.5">
            <span class="sr-only">MVP2PROD — доработка ИИ-прототипов до запуска</span>
            <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-indigo-600 text-white shadow-sm shadow-indigo-500/30">
              {{ partial "icons/code.html" (dict "class" "h-5 w-5") }}
            </div>
            <span class="text-xl font-bold tracking-tight text-slate-900">MVP2PROD</span>
          </a>
        </div>

        <div class="hidden lg:flex lg:gap-x-3">
          <a href="/#services" class="rounded-full px-4 py-1.5 text-sm font-semibold leading-6 text-slate-700 transition hover:bg-white/90 hover:text-indigo-600">Услуги</a>
          <a href="/#turnkey" class="rounded-full px-4 py-1.5 text-sm font-semibold leading-6 text-slate-700 transition hover:bg-white/90 hover:text-indigo-600">Процесс</a>
          <a href="/#portfolio" class="rounded-full px-4 py-1.5 text-sm font-semibold leading-6 text-slate-700 transition hover:bg-white/90 hover:text-indigo-600">Примеры задач</a>
          <a href="/#faq" class="rounded-full px-4 py-1.5 text-sm font-semibold leading-6 text-slate-700 transition hover:bg-white/90 hover:text-indigo-600">FAQ</a>
          <a href="/articles/" class="rounded-full px-4 py-1.5 text-sm font-semibold leading-6 text-slate-700 transition hover:bg-white/90 hover:text-indigo-600">Статьи</a>
        </div>

        <div class="hidden flex-1 justify-end lg:flex">
          <a href="/#contact" class="flex items-center gap-2 rounded-full bg-slate-900 px-4 py-2 text-sm font-semibold leading-6 text-white transition-colors hover:bg-slate-800">
            Проверить прототип <span aria-hidden="true">&rarr;</span>
          </a>
        </div>

        <details class="group relative lg:hidden">
          <summary class="flex cursor-pointer list-none items-center gap-2 rounded-full border border-slate-300/80 bg-white/90 px-3 py-2 text-sm font-semibold text-slate-800 marker:content-none">
            Меню
            <span aria-hidden="true" class="transition group-open:rotate-180">▾</span>
          </summary>
          <div class="absolute right-0 mt-2 w-64 rounded-2xl border border-white/70 bg-white/95 p-2 shadow-xl backdrop-blur-xl">
            <a href="/#services" class="block rounded-xl px-3 py-2 text-sm font-medium text-slate-700 hover:bg-indigo-50 hover:text-indigo-700">Услуги</a>
            <a href="/#turnkey" class="block rounded-xl px-3 py-2 text-sm font-medium text-slate-700 hover:bg-indigo-50 hover:text-indigo-700">Процесс</a>
            <a href="/#portfolio" class="block rounded-xl px-3 py-2 text-sm font-medium text-slate-700 hover:bg-indigo-50 hover:text-indigo-700">Примеры задач</a>
            <a href="/#faq" class="block rounded-xl px-3 py-2 text-sm font-medium text-slate-700 hover:bg-indigo-50 hover:text-indigo-700">FAQ</a>
            <a href="/articles/" class="block rounded-xl px-3 py-2 text-sm font-medium text-slate-700 hover:bg-indigo-50 hover:text-indigo-700">Статьи</a>
            <a href="/#contact" class="mt-2 flex items-center justify-center gap-2 rounded-xl bg-slate-900 px-3 py-2 text-sm font-semibold text-white hover:bg-slate-800">
              Проверить прототип <span aria-hidden="true">&rarr;</span>
            </a>
          </div>
        </details>
      </div>
    </nav>
  </div>
</header>
