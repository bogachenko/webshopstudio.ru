<section id="contact" class="bg-gray-900 py-20 sm:py-32">
  <div class="site-container">
    <div class="mx-auto max-w-2xl text-center">
      <h2 class="text-3xl font-bold tracking-tight text-white sm:text-4xl">Want to launch a website or online store?</h2>
      <p class="mt-4 text-lg leading-8 text-gray-300">Tell us what kind of website you need, and we will suggest a suitable solution, timeline, and cost.</p>
    </div>

    <form id="contact-form" action="#" method="POST" class="mx-auto mt-16 max-w-xl sm:mt-20">
      <div class="grid grid-cols-1 gap-x-8 gap-y-6 sm:grid-cols-2">
        <div class="sm:col-span-2">
          <label for="name" class="block text-sm font-semibold leading-6 text-white">Name</label>
          <div class="mt-2.5">
            <input type="text" name="name" id="name" autocomplete="given-name" placeholder="John Doe" class="block w-full rounded-md border-0 bg-white/5 px-3.5 py-2 text-white shadow-sm ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-indigo-500 sm:text-sm sm:leading-6" />
          </div>
        </div>
        <div class="sm:col-span-2">
          <label for="contact-info" class="block text-sm font-semibold leading-6 text-white">Phone number or messenger</label>
          <div class="mt-2.5">
            <input type="text" name="contact-info" id="contact-info" placeholder="+1 (555) 000-0000 or @telegram" class="block w-full rounded-md border-0 bg-white/5 px-3.5 py-2 text-white shadow-sm ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-indigo-500 sm:text-sm sm:leading-6" />
          </div>
        </div>
        <div class="sm:col-span-2">
          <label for="website-type" class="block text-sm font-semibold leading-6 text-white">Website type</label>
          <div class="mt-2.5">
            <select id="website-type" name="website-type" class="block w-full rounded-md border-0 bg-slate-800 px-3.5 py-2 text-white shadow-sm ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-indigo-500 sm:text-sm sm:leading-6">
              <option>Business card website</option>
              <option>Landing page</option>
              <option>Online store (WooCommerce)</option>
              <option>Corporate website</option>
              <option>Not sure yet</option>
            </select>
          </div>
        </div>
        <div class="sm:col-span-2">
          <label for="message" class="block text-sm font-semibold leading-6 text-white">Brief task description</label>
          <div class="mt-2.5">
            <textarea name="message" id="message" rows="4" placeholder="Tell us a little bit about your business and needs..." class="block w-full rounded-md border-0 bg-white/5 px-3.5 py-2 text-white shadow-sm ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-indigo-500 sm:text-sm sm:leading-6"></textarea>
          </div>
        </div>
      </div>
      <div class="mt-10">
        <button type="submit" class="block w-full rounded-md bg-indigo-500 px-3.5 py-3 text-center text-sm font-semibold text-white shadow-sm transition-colors hover:bg-indigo-400 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500">Discuss a project</button>
      </div>
    </form>
  </div>
</section>
