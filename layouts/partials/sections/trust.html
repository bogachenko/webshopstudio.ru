{{ $trust := site.Data.trust }}
<section id="trust" class="site-section site-section-white">
  <div class="site-container">
    <div class="fade-in mx-auto max-w-2xl text-center" style="--fade-delay: 0s">
      <h2 class="text-3xl font-bold tracking-tight text-gray-900 sm:text-4xl">{{ $trust.heading }}</h2>
      <p class="mt-6 text-lg leading-8 text-gray-600">{{ $trust.description }}</p>
    </div>

    <div class="fade-in mx-auto mt-16 max-w-4xl rounded-3xl bg-gray-50 p-8 ring-1 ring-gray-200 sm:p-10" style="--fade-delay: 0.1s">
      <div class="grid grid-cols-1 gap-x-8 gap-y-6 sm:grid-cols-2">
        {{ range $index, $item := $trust.items }}
          <div class="flex items-start gap-3">
            {{ partial "icons/check.html" (dict "class" "mt-0.5 h-5 w-5 flex-none text-indigo-600") }}
            <span class="text-base leading-7 text-gray-700">{{ . }}</span>
          </div>
        {{ end }}
      </div>
    </div>
  </div>
</section>
