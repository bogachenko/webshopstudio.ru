{{ $problems := site.Data.problems }}
<section id="problems" class="site-section site-section-gray">
  <div class="site-container">
    <div class="fade-in mx-auto max-w-3xl text-center" style="--fade-delay: 0s">
      <p class="text-sm font-semibold uppercase tracking-[0.22em] text-indigo-600">После AI-генерации</p>
      <h2 class="mt-3 text-3xl font-bold tracking-tight text-gray-900 sm:text-4xl">{{ $problems.heading }}</h2>
      <p class="mt-6 text-lg leading-8 text-gray-600">{{ $problems.description }}</p>
    </div>

    <div class="mx-auto mt-14 grid max-w-5xl grid-cols-1 gap-4 sm:grid-cols-2">
      {{ range $index, $item := $problems.items }}
        <article class="fade-in flex items-start gap-3 rounded-2xl border border-gray-200 bg-white p-5 shadow-sm" style="--fade-delay: {{ mul $index 0.05 }}s">
          <div class="mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-full bg-rose-50 text-rose-600">
            <svg aria-hidden="true" focusable="false" class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 9v4" />
              <path d="M12 17h.01" />
              <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z" />
            </svg>
          </div>
          <p class="text-base leading-7 text-gray-700">{{ . }}</p>
        </article>
      {{ end }}
    </div>
  </div>
</section>
